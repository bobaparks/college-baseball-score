var HBCU = { 'SWAC':1, 'MEAC':1 };

function getConf(name) {
  if (!name) return '';
  if (CM[name]) return CM[name];
  // strip apostrophes for looser match
  var stripped = name.replace(/['']/g, '');
  if (CM[stripped]) return CM[stripped];
  var lo = name.toLowerCase();
  var keys = Object.keys(CM);
  for (var i = 0; i < keys.length; i++) {
    if (keys[i].toLowerCase() === lo) return CM[keys[i]];
  }
  return '';
}

function isHBCUGame(g) {
  return !!HBCU[getConf(g.away.name)] || !!HBCU[getConf(g.home.name)];
}

// ── Dates ─────────────────────────────────────────────────────────────────────
function fmtDate(d) {
  var m = d.getMonth() + 1;
  var day = d.getDate();
  return '' + d.getFullYear() + (m < 10 ? '0' + m : m) + (day < 10 ? '0' + day : day);
}
function dispDate(d) {
  var days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  var mons = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  return days[d.getDay()] + ' ' + mons[d.getMonth()] + ' ' + d.getDate();
}
function buildDateStrip() {
  var strip = document.getElementById('dateStrip');
  strip.innerHTML = '';
  var today = new Date();
  for (var i = -3; i <= 3; i++) {
    (function(offset) {
      var d = new Date(today);
      d.setDate(today.getDate() + offset);
      var key = fmtDate(d);
      var btn = document.createElement('button');
      btn.className = 'date-chip' + (key === selDate ? ' active' : '');
      btn.textContent = offset === 0 ? 'TODAY' : dispDate(d);
      btn.onclick = function() { selDate = key; scoresLoaded = false; buildDateStrip(); fetchScores(); };
      strip.appendChild(btn);
    })(i);
  }
}

// ── Fetch ─────────────────────────────────────────────────────────────────────
var scoresLoaded = false;

function fetchScores() {
  // Only show loading spinner on first load — background refreshes update silently
  if (!scoresLoaded) {
    document.getElementById('main').innerHTML =
      '<div class="loading"><div>LOADING SCORES</div><div class="lbar"></div></div>';
  }
  var url = 'https://site.api.espn.com/apis/site/v2/sports/baseball/college-baseball/scoreboard?limit=200' +
            (selDate ? '&dates=' + selDate : '');
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      scoresLoaded = true;
      var prevGames = allGames.slice();
      allGames = [];
      var events = data.events || [];
      for (var i = 0; i < events.length; i++) {
        var g = parseGame(events[i]);
        if (g) allGames.push(g);
      }
      // If game count/status changed, full re-render; otherwise patch in place
      var needsFullRender = prevGames.length !== allGames.length;
      if (!needsFullRender) {
        for (var pi = 0; pi < allGames.length; pi++) {
          if (!prevGames[pi] || prevGames[pi].id !== allGames[pi].id ||
              prevGames[pi].gs !== allGames[pi].gs) {
            needsFullRender = true; break;
          }
        }
      }
      if (needsFullRender) {
        renderGames();
      } else {
        patchLiveCards();
      }
      buildTicker();
      var t = new Date();
      var h = t.getHours(); var mn = t.getMinutes();
      var ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      document.getElementById('lastUpdated').textContent =
        'UPD ' + (h < 10 ? '0'+h : h) + ':' + (mn < 10 ? '0'+mn : mn) + ' ' + ampm;
    })
    .catch(function(err) {
      console.error(err);
      document.getElementById('main').innerHTML =
        '<div class="empty"><span class="icon">&#9918;</span>' +
        '<p>UNABLE TO LOAD SCORES</p><p style="margin-top:8px;font-size:9px">CHECK CONNECTION</p></div>';
    });
}

function parseGame(ev) {
  try {
    var comp = (ev.competitions || [])[0] || {};
    var comps = comp.competitors || [];
    var away = null, home = null;
    for (var i = 0; i < comps.length; i++) {
      if (comps[i].homeAway === 'away') away = comps[i];
      if (comps[i].homeAway === 'home') home = comps[i];
    }
    if (!away) away = comps[0] || {};
    if (!home) home = comps[1] || {};

    var st = (comp.status || {});
    var stName = ((st.type || {}).name) || 'STATUS_SCHEDULED';
    var gs = 'scheduled';
    if (stName === 'STATUS_IN_PROGRESS') gs = 'live';
    else if (stName === 'STATUS_FINAL' || stName === 'STATUS_FINAL_ATS') gs = 'final';

    var aScore = parseInt(away.score) || 0;
    var hScore = parseInt(home.score) || 0;

    var aLS = away.linescores || [];
    var hLS = home.linescores || [];
    var ls = [];
    for (var j = 0; j < aLS.length; j++) {
      ls.push({
        inn: j + 1,
        a: (aLS[j].value !== undefined && aLS[j].value !== null) ? aLS[j].value : '-',
        h: (hLS[j] && hLS[j].value !== undefined && hLS[j].value !== null) ? hLS[j].value : '-'
      });
    }

    var sit = comp.situation || {};
    var aRec = ((away.records || [])[0] || {}).summary || '';
    var hRec = ((home.records || [])[0] || {}).summary || '';
    var aRnkRaw = (away.curatedRank || {}).current;
    var hRnkRaw = (home.curatedRank || {}).current;

    var d = new Date(ev.date);
    var hr = d.getHours(); var min = d.getMinutes();
    var ap = hr >= 12 ? 'PM' : 'AM'; hr = hr % 12 || 12;
    var timeStr = hr + ':' + (min < 10 ? '0'+min : min) + ' ' + ap;

    var pitchers = {};
    var allComps = comp.competitors || [];
    for (var ci = 0; ci < allComps.length; ci++) {
      var ldrs = allComps[ci].leaders || [];
      for (var li = 0; li < ldrs.length; li++) {
        var ldr = ldrs[li];
        if (ldr.name === 'wins' && ldr.leaders && ldr.leaders[0]) pitchers.winner = ldr.leaders[0];
        if (ldr.name === 'losses' && ldr.leaders && ldr.leaders[0]) pitchers.loser = ldr.leaders[0];
      }
    }

    var aTeam = away.team || {};
    var hTeam = home.team || {};

    return {
      id: ev.id,
      gs: gs,
      period: st.period || 1,
      sit: sit,
      away: {
        name: aTeam.shortDisplayName || aTeam.name || 'Away',
        abbr: aTeam.abbreviation || '??',
        color: aTeam.color ? '#' + aTeam.color : '#334455',
        score: aScore,
        rec: aRec,
        rank: (aRnkRaw && aRnkRaw <= 25) ? '#' + aRnkRaw : '',
        ls: aLS
      },
      home: {
        name: hTeam.shortDisplayName || hTeam.name || 'Home',
        abbr: hTeam.abbreviation || '??',
        color: hTeam.color ? '#' + hTeam.color : '#334455',
        score: hScore,
        rec: hRec,
        rank: (hRnkRaw && hRnkRaw <= 25) ? '#' + hRnkRaw : '',
        ls: hLS
      },
      ls: ls,
      time: timeStr,
      venue: (comp.venue || {}).fullName || '',
      pitchers: pitchers
    };
  } catch(e) {
    console.error('parseGame error', e, ev);
    return null;
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderGames() {
  var main = document.getElementById('main');
  var games = allGames.slice();

  if (statusFilt !== 'all') {
    games = games.filter(function(g) { return g.gs === statusFilt; });
  }
  if (confFilt === 'hbcu') {
    games = games.filter(isHBCUGame);
  } else if (confFilt !== 'all') {
    games = games.filter(function(g) {
      return getConf(g.away.name) === confFilt || getConf(g.home.name) === confFilt;
    });
  }
  if (searchQ) {
    var q = searchQ.toLowerCase();
    games = games.filter(function(g) {
      return g.away.name.toLowerCase().indexOf(q) >= 0 ||
             g.home.name.toLowerCase().indexOf(q) >= 0;
    });
  }

  if (!games.length) {
    main.innerHTML = '<div class="empty"><span class="icon">&#9918;</span><p>NO GAMES FOUND</p></div>';
    return;
  }

  var live = games.filter(function(g){ return g.gs === 'live'; });
  var sched = games.filter(function(g){ return g.gs === 'scheduled'; });
  var fin = games.filter(function(g){ return g.gs === 'final'; });

  var html = '';
  if (live.length) {
    html += '<div class="sec-hdr"><span class="sec-title">LIVE NOW</span><span class="sec-cnt">' + live.length + '</span></div>';
    html += '<div class="grid">' + live.map(buildCard).join('') + '</div>';
  }
  if (sched.length) {
    html += '<div class="sec-hdr"><span class="sec-title">UPCOMING</span><span class="sec-cnt">' + sched.length + '</span></div>';
    html += '<div class="grid">' + sched.map(buildCard).join('') + '</div>';
  }
  if (fin.length) {
    html += '<div class="sec-hdr"><span class="sec-title">FINAL</span><span class="sec-cnt">' + fin.length + '</span></div>';
    html += '<div class="grid">' + fin.map(buildCard).join('') + '</div>';
  }
  main.innerHTML = html;
}

function initials(name) {
  if (!name) return '??';
  var parts = name.trim().split(' ');
  return parts[parts.length - 1].substring(0, 2).toUpperCase();
}

function buildCard(g) {
  var live = g.gs === 'live';
  var fin  = g.gs === 'final';
  var sched = g.gs === 'scheduled';
  var aW = g.away.score > g.home.score;
  var hW = g.home.score > g.away.score;

  // Status label
  var sLabel = '';
  if (live)  sLabel = '<span class="gstatus slive">&#9679; LIVE &mdash; INN ' + g.period + '</span>';
  else if (fin) sLabel = '<span class="gstatus sfinal">FINAL</span>';
  else sLabel = '<span class="gstatus ssched">' + g.time + '</span>';

  // Scores
  var aSc = sched ? '' : '<span class="tscorebig ' + (aW ? 'win' : 'lose') + '">' + g.away.score + '</span>';
  var hSc = sched ? '' : '<span class="tscorebig ' + (hW ? 'win' : 'lose') + '">' + g.home.score + '</span>';

  // HBCU badges
  var aBadge = HBCU[getConf(g.away.name)] ? '<span class="hbadge">HBCU</span>' : '';
  var hBadge = HBCU[getConf(g.home.name)] ? '<span class="hbadge">HBCU</span>' : '';

  // Linescore
  var lineHtml = '';
  if (!sched && g.ls.length) {
    var heads = '';
    var aRow = '';
    var hRow = '';
    for (var i = 0; i < g.ls.length; i++) {
      heads += '<th>' + g.ls[i].inn + '</th>';
      aRow  += '<td>' + g.ls[i].a + '</td>';
      hRow  += '<td>' + g.ls[i].h + '</td>';
    }
    var aT = 0, hT = 0;
    for (var j = 0; j < g.away.ls.length; j++) aT += (g.away.ls[j].value || 0);
    for (var k = 0; k < g.home.ls.length; k++) hT += (g.home.ls[k].value || 0);
    lineHtml = '<div class="linescore"><table>' +
      '<tr><th class="lbl"></th>' + heads + '<th class="tot">R</th></tr>' +
      '<tr><td class="lbl">' + g.away.abbr + '</td>' + aRow + '<td class="tot">' + aT + '</td></tr>' +
      '<tr><td class="lbl">' + g.home.abbr + '</td>' + hRow + '<td class="tot">' + hT + '</td></tr>' +
      '</table></div>';
  }

  // Footer
  var footHtml = '';
  if (live) {
    var s = g.sit;
    var hasSit = s && (s.onFirst !== undefined || s.onSecond !== undefined ||
                       s.onThird !== undefined || s.balls !== undefined ||
                       s.strikes !== undefined || s.outs !== undefined);
    if (!hasSit) {
      footHtml = '<div class="gfoot"><span style="color:var(--muted);font-size:9px;letter-spacing:1px">Live data not yet available</span></div>';
    } else {
      var batter = (s.batter && s.batter.athlete) ? (s.batter.athlete.shortName || '') : '';
      footHtml = '<div class="gfoot">' +
        '<div class="bases-row">' +
          '<div class="diamond">' +
            '<div class="base bhome"></div>' +
            '<div class="base bfirst' + (s.onFirst  ? ' on' : '') + '"></div>' +
            '<div class="base bsecond' + (s.onSecond ? ' on' : '') + '"></div>' +
            '<div class="base bthird' + (s.onThird  ? ' on' : '') + '"></div>' +
          '</div>' +
          '<div class="outs">' +
            '<div class="odot' + ((s.outs||0)>=1?' on':'') + '"></div>' +
            '<div class="odot' + ((s.outs||0)>=2?' on':'') + '"></div>' +
          '</div>' +
          '<span class="live-count" style="font-size:9px;color:var(--muted)">' + (s.balls||0) + '-' + (s.strikes||0) + '</span>' +
        '</div>' +
        '<span class="live-batter">' + batter + '</span>' +
      '</div>';
    }
  } else if (fin && (g.pitchers.winner || g.pitchers.loser)) {
    var wn = (g.pitchers.winner && g.pitchers.winner.athlete) ? (g.pitchers.winner.athlete.shortName||'&mdash;') : '&mdash;';
    var ln = (g.pitchers.loser  && g.pitchers.loser.athlete)  ? (g.pitchers.loser.athlete.shortName||'&mdash;')  : '&mdash;';
    footHtml = '<div class="gfoot"><span><span class="wpitch">W</span> ' + wn + '</span><span><span class="lpitch">L</span> ' + ln + '</span></div>';
  } else if (sched && g.venue) {
    footHtml = '<div class="gfoot"><span>' + g.venue + '</span></div>';
  }

  // Links — ESPN + StatBroadcast + Sidearm
  var gcUrl  = 'https://www.espn.com/college-baseball/game/_/gameId/' + g.id;
  // Find StatBroadcast GID: prefer home team (the hosting school)
  var sbGid  = SB[g.home.name] || SB[g.away.name] || null;
  var sbUrl  = sbGid ? 'https://www.statbroadcast.com/events/statmonitr.php?gid=' + sbGid : null;
  // Find Sidearm domain: prefer home team
  var sdDom  = SD[g.home.name] || SD[g.away.name] || null;
  var sdUrl  = sdDom ? 'https://' + sdDom + '/sidearmstats/baseball/summary' : null;

  var lHtml = '<div class="glinks">';
  if (live) lHtml += '<a class="glink pri" href="' + gcUrl + '" target="_blank" rel="noopener">&#9654; GAMECAST</a>';
  if (!sched) lHtml += '<button class="glink bs-btn" data-gameid="' + g.id + '">&#9776; BOX SCORE</button>';
  lHtml += '<a class="glink" href="' + gcUrl + '" target="_blank" rel="noopener">&#8599; ESPN</a>';
  if (sbUrl) lHtml += '<a class="glink" href="' + sbUrl + '" target="_blank" rel="noopener" title="StatBroadcast live stats">&#128200; STATBCAST</a>';
  if (sdUrl) lHtml += '<a class="glink" href="' + sdUrl + '" target="_blank" rel="noopener" title="Sidearm live stats">&#128202; SIDEARM</a>';
  lHtml += '</div>';

  var ac = g.away.color; var hc = g.home.color;

  return '<div class="card ' + g.gs + '" data-gameid="' + g.id + '">' +
    '<div class="gmeta">' + sLabel +
    '<span class="recinfo">' + (g.away.rec && g.home.rec ? g.away.rec + ' / ' + g.home.rec : '') + '</span></div>' +
    '<div class="teams">' +
      '<div class="trow">' +
        '<span class="trank">' + g.away.rank + '</span>' +
        '<div class="tlogo" style="background:' + ac + '20;color:' + ac + ';border-color:' + ac + '40">' + initials(g.away.name) + '</div>' +
        '<div class="tname">' + g.away.name + aBadge + '</div>' +
        aSc +
      '</div>' +
      '<div class="trow">' +
        '<span class="trank">' + g.home.rank + '</span>' +
        '<div class="tlogo" style="background:' + hc + '20;color:' + hc + ';border-color:' + hc + '40">' + initials(g.home.name) + '</div>' +
        '<div class="tname">' + g.home.name + hBadge + '</div>' +
        hSc +
      '</div>' +
    '</div>' +
    lineHtml + footHtml + lHtml +
  '</div>';
}

// ── Patch live card situation data in-place (no full re-render) ──────────────
function patchLiveCards() {
  for (var pi = 0; pi < allGames.length; pi++) {
    var g = allGames[pi];
    var card = document.querySelector('.card[data-gameid="' + g.id + '"]');
    if (!card) continue;

    // Update score
    var trows = card.querySelectorAll('.trow');
    if (trows[0]) {
      var aSc = trows[0].querySelector('.tscorebig');
      if (aSc) { aSc.textContent = g.away.score; aSc.className = 'tscorebig ' + (g.away.score > g.home.score ? 'win' : 'lose'); }
    }
    if (trows[1]) {
      var hSc = trows[1].querySelector('.tscorebig');
      if (hSc) { hSc.textContent = g.home.score; hSc.className = 'tscorebig ' + (g.home.score > g.away.score ? 'win' : 'lose'); }
    }

    if (g.gs !== 'live') continue;
    var s = g.sit || {};
    var hasSit = s && (s.onFirst !== undefined || s.onSecond !== undefined ||
                       s.onThird !== undefined || s.balls !== undefined ||
                       s.strikes !== undefined || s.outs !== undefined);
    // If situation data just arrived for a card that showed the placeholder, force a full re-render
    var placeholder = card.querySelector('.gfoot span[style*="not yet"]');
    if (placeholder && hasSit) { renderGames(); return; }
    if (!hasSit) continue;

    // Update status label
    var statusEl = card.querySelector('.gstatus');
    if (statusEl) statusEl.innerHTML = '&#9679; LIVE &mdash; INN ' + (g.period || '');

    // Update bases
    var bases = card.querySelectorAll('.base');
    for (var bi = 0; bi < bases.length; bi++) {
      var b = bases[bi];
      if (b.classList.contains('bfirst'))  { b.className = 'base bfirst'  + (s.onFirst  ? ' on' : ''); }
      if (b.classList.contains('bsecond')) { b.className = 'base bsecond' + (s.onSecond ? ' on' : ''); }
      if (b.classList.contains('bthird'))  { b.className = 'base bthird'  + (s.onThird  ? ' on' : ''); }
    }

    // Update outs
    var odots = card.querySelectorAll('.odot');
    if (odots[0]) odots[0].className = 'odot' + ((s.outs||0) >= 1 ? ' on' : '');
    if (odots[1]) odots[1].className = 'odot' + ((s.outs||0) >= 2 ? ' on' : '');

    // Update count
    var countEl = card.querySelector('.live-count');
    if (countEl) countEl.textContent = (s.balls||0) + '-' + (s.strikes||0);

    // Update batter name
    var batterEl = card.querySelector('.live-batter');
    if (batterEl) {
      batterEl.textContent = (s.batter && s.batter.athlete) ? (s.batter.athlete.shortName || '') : '';
    }

    // Update linescore rows
    if (g.ls && g.ls.length) {
      var lsRows = card.querySelectorAll('.linescore tbody tr');
      if (lsRows[0] && lsRows[1]) {
        var aCells = lsRows[0].querySelectorAll('td:not(.lbl):not(.tot)');
        var hCells = lsRows[1].querySelectorAll('td:not(.lbl):not(.tot)');
        for (var li = 0; li < g.ls.length && li < aCells.length; li++) {
          aCells[li].textContent = g.ls[li].a;
          if (hCells[li]) hCells[li].textContent = g.ls[li].h;
        }
        var aTot = lsRows[0].querySelector('.tot');
        var hTot = lsRows[1].querySelector('.tot');
        if (aTot) aTot.textContent = g.away.score;
        if (hTot) hTot.textContent = g.home.score;
      }
    }
  }
}

function buildTicker() {
  var live = allGames.filter(function(g){ return g.gs === 'live'; });
  var src  = live.length ? live : allGames.slice(0, 10);
  if (!src.length) return;
  var dbl = src.concat(src);
  var html = dbl.map(function(g) {
    return '<span class="ticker-item ticker-clickable" data-gameid="' + g.id + '" title="Click to find game">' +
      g.away.abbr + ' <span class="tscore">' + g.away.score + '</span>' +
      ' &mdash; ' +
      g.home.abbr + ' <span class="tscore">' + g.home.score + '</span>' +
      (g.gs === 'live'
        ? ' <span class="tlive">&#9679; ' + g.period + '</span>'
        : ' <span>' + g.gs.toUpperCase() + '</span>') +
      '&nbsp;&nbsp;&nbsp;</span>';
  }).join('');
  document.getElementById('tickerInner').innerHTML = html;
}

// ── Stats Leaders Panel ──────────────────────────────────────────────────────
var slOpen     = false;
var slScope    = 'overall';  // 'overall' | 'conf'
var slConfFilt = 'all';

var CAT_LABELS = { AVG:'BATTING AVG', HR:'HOME RUNS', RBI:'RBI', ERA:'ERA', K:'STRIKEOUTS', SV:'SAVES',
                   H:'HITS', SB:'STOLEN BASES', OBP:'ON-BASE %', SLG:'SLUGGING' };
var PITCHER_CATS = { ERA:1, K:1, W:1, SV:1, IP:1 };

function renderSlGrid() {
  var grid = document.getElementById('slGrid');
  if (!grid) return;
  if (!statsBuilt) {
    grid.innerHTML = '<div style="font-size:10px;color:var(--muted);letter-spacing:2px;padding:8px 0">LOADING STATS&hellip;</div>';
    return;
  }

  // Pick data source
  var src = slScope === 'overall' ? overallItems : confItems;

  // Apply conference filter in conf scope
  if (slScope === 'conf' && slConfFilt !== 'all') {
    src = src.filter(function(d) { return d.conf === slConfFilt; });
  }

  // Group by category (and conf if applicable)
  var groups = {};
  for (var i = 0; i < src.length; i++) {
    var d = src[i];
    var key = slScope === 'conf' ? d.conf + '|' + d.cat : d.cat;
    if (!groups[key]) groups[key] = { cat:d.cat, conf:d.conf||'', rows:[] };
    groups[key].rows.push(d);
  }

  // Sort keys: overall → by cat order; conf → by conf alpha then cat
  var CAT_ORDER = ['AVG','HR','RBI','ERA','K','SV','H','SB','OBP','SLG','W'];
  var keys = Object.keys(groups).sort(function(a,b) {
    var ga = groups[a]; var gb = groups[b];
    if (slScope === 'conf') {
      if (ga.conf < gb.conf) return -1;
      if (ga.conf > gb.conf) return 1;
    }
    return CAT_ORDER.indexOf(ga.cat) - CAT_ORDER.indexOf(gb.cat);
  });

  if (!keys.length) {
    grid.innerHTML = '<div style="font-size:10px;color:var(--muted);letter-spacing:2px;padding:8px 0">NO DATA FOR SELECTED FILTERS</div>';
    return;
  }

  var html = '';
  for (var ki = 0; ki < keys.length; ki++) {
    var grp = groups[keys[ki]];
    var isPitcher = !!PITCHER_CATS[grp.cat];
    var catLabel  = CAT_LABELS[grp.cat] || grp.cat;
    html += '<div class="sl-card">';
    html += '<div class="sl-card-hdr"><span>' + catLabel + '</span>';
    if (grp.conf) html += '<span class="sl-card-conf">' + grp.conf + '</span>';
    html += '</div>';
    for (var ri = 0; ri < grp.rows.length; ri++) {
      var r = grp.rows[ri];
      html += '<div class="sl-row">' +
        '<span class="sl-rank">' + (ri+1) + '</span>' +
        '<div style="flex:1;min-width:0">' +
          '<div class="sl-player">' + r.player + '</div>' +
          '<div class="sl-team">' + r.team + '</div>' +
        '</div>' +
        '<span class="sl-val' + (isPitcher?' pitcher':'') + '">' + r.val + '</span>' +
      '</div>';
    }
    html += '</div>';
  }
  grid.innerHTML = html;
}

function openSlPanel() {
  slOpen = true;
  document.getElementById('slPanel').classList.add('open');
  document.getElementById('slBtn').classList.add('open');

// ── Ticker swipe/scroll speed + click-to-filter ─────────────────────────────
(function() {
  function initTickerInteraction(wrapperId, innerId) {
    var wrap  = document.getElementById(wrapperId) || document.querySelector('.' + wrapperId);
    var inner = document.getElementById(innerId);
    if (!wrap || !inner) return;

    // Wheel: speed up / slow down animation duration
    wrap.addEventListener('wheel', function(e) {
      e.preventDefault();
      var style     = window.getComputedStyle(inner);
      var duration  = parseFloat(style.animationDuration) || 40;
      // Scroll down = faster (shorter duration), scroll up = slower
      var delta = e.deltaY > 0 ? -4 : 4;
      duration = Math.max(8, Math.min(120, duration + delta));
      inner.style.animationDuration = duration + 's';
    }, { passive: false });

    // Touch swipe: drag to scrub speed
    var touchStartX = null;
    wrap.addEventListener('touchstart', function(e) {
      touchStartX = e.touches[0].clientX;
      inner.classList.add('paused');
    }, { passive: true });
    wrap.addEventListener('touchmove', function(e) {
      if (touchStartX === null) return;
      var dx = e.touches[0].clientX - touchStartX;
      var style    = window.getComputedStyle(inner);
      var duration = parseFloat(style.animationDuration) || 40;
      duration = Math.max(8, Math.min(120, duration - dx * 0.1));
      inner.style.animationDuration = duration + 's';
      touchStartX = e.touches[0].clientX;
    }, { passive: true });
    wrap.addEventListener('touchend', function() {
      touchStartX = null;
      inner.classList.remove('paused');
    }, { passive: true });
  }

  // Init both tickers after DOM ready
  initTickerInteraction('tickerWrap', 'tickerInner');
  initTickerInteraction('statsTickerWrap', 'statsTickerInner');
})();

function fetchAllStats() {
  // Show seed data immediately — live fetch overrides if successful
  seedStats();

  var PROXY = 'https://corsproxy.io/?url=';
  var STAT_PAGES = [
    { url:'https://d1sportsnet.com/baseball/stats/avg.php',     cat:'AVG', col:8 },
    { url:'https://d1sportsnet.com/baseball/stats/hrs.php',     cat:'HR',  col:6 },
    { url:'https://d1sportsnet.com/baseball/stats/rbi.php',     cat:'RBI', col:6 },
    { url:'https://d1sportsnet.com/baseball/stats/era.php',     cat:'ERA', col:8 },
    { url:'https://d1sportsnet.com/baseball/stats/strikes.php', cat:'K',   col:7 },
    { url:'https://d1sportsnet.com/baseball/stats/saves.php',   cat:'SV',  col:7 }
  ];

  function abbrevName(full) {
    if (!full) return full;
    var parts = full.trim().split(/\s+/);
    if (parts.length < 2) return full;
    return parts[0].charAt(0) + '. ' + parts.slice(1).join(' ');
  }

  // Each category updates independently — a failed fetch keeps the seed rows for that cat
  STAT_PAGES.forEach(function(sp) {
    fetch(PROXY + encodeURIComponent(sp.url), { cache:'no-store' })
      .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
      .then(function(html) {
        var parser = new DOMParser();
        var doc = parser.parseFromString(html, 'text/html');
        var rows = doc.querySelectorAll('table tr');
        var fresh = [];
        for (var i = 0; i < rows.length && fresh.length < 5; i++) {
          var cells = rows[i].querySelectorAll('td');
          if (cells.length < sp.col + 1) continue;
          var name = cells[1] ? cells[1].textContent.trim() : '';
          var team = cells[2] ? cells[2].textContent.trim() : '';
          var val  = cells[sp.col] ? cells[sp.col].textContent.trim() : '';
          if (!name || name === 'Name' || !/[A-Za-z]{2}/.test(name)) continue;
          if (!val || val === sp.cat) continue;
          fresh.push({ scope:'overall', conf:'', cat:sp.cat,
            player:abbrevName(name), team:team, val:val });
        }
        if (fresh.length >= 3) {
          // Replace just this category's rows in overallItems, preserve all others
          overallItems = overallItems.filter(function(d) { return d.cat !== sp.cat; })
            .concat(fresh);
          console.log('Stats: live ' + sp.cat + ' loaded (' + fresh.length + ' entries)');
          if (statsScope === 'overall') renderStatsTicker();
          if (slOpen) renderSlGrid();
        } else {
          console.warn('Stats: ' + sp.cat + ' live returned only ' + fresh.length + ' — keeping seed');
        }
      })
      .catch(function(e) { console.warn('Stats live fetch failed (' + sp.cat + '):', e); });
  });

}

function renderStatsTicker() {
  var inner   = document.getElementById('statsTickerInner');
  var loading = document.getElementById('statsLoading');
  var raw     = statsScope === 'overall' ? overallItems : confItems;

  if (!raw || !raw.length) {
    loading.textContent    = 'STATS UNAVAILABLE';
    loading.style.display  = 'block';
    inner.style.display    = 'none';
    return;
  }

  // Sort by canonical category order so ticker always reads AVG→HR→RBI→ERA→K→SV
  var CAT_ORD = ['AVG','HR','RBI','ERA','K','SV','H','SB','OBP','SLG','W'];
  var items = raw.slice().sort(function(a,b) {
    var ai = CAT_ORD.indexOf(a.cat); var bi = CAT_ORD.indexOf(b.cat);
    if (ai !== bi) return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    // Within same cat, sort conf items by conf name
    if (a.conf < b.conf) return -1;
    if (a.conf > b.conf) return 1;
    return 0;
  });

  var doubled = items.concat(items);
  var html = '';
  for (var i = 0; i < doubled.length; i++) {
    var it = doubled[i];
    html += '<span class="stat-item">' +
      '<span class="stat-cat">'    + it.cat    + '</span>' +
      (it.conf ? '<span class="stat-conf">' + it.conf + '</span>' : '') +
      '<span class="stat-player">' + it.player + '</span>' +
      (it.team ? '<span class="stat-team">(' + it.team + ')</span>' : '') +
      '<span class="stat-val">'    + it.val    + '</span>' +
    '</span>';
    if ((i + 1) % 5 === 0) html += '<span class="stats-divider">&#9670;</span>';
  }

  inner.innerHTML = html;
  loading.style.display         = 'none';
  inner.style.display           = 'flex';
  inner.style.animationDuration = Math.max(40, items.length * 3) + 's';
}

function openBoxScore(gameId) {
  var overlay = document.getElementById('bsOverlay');
  var title   = document.getElementById('bsTitle');
  var sub     = document.getElementById('bsSubtitle');
  var body    = document.getElementById('bsBody');

  // Find local game data for header / linescore fallback
  var game = null;
  for (var gi = 0; gi < allGames.length; gi++) {
    if (allGames[gi].id === gameId) { game = allGames[gi]; break; }
  }

  title.textContent = game ? (game.away.name + ' @ ' + game.home.name) : 'BOX SCORE';
  sub.textContent   = game ? (game.gs === 'final' ? 'FINAL' : game.gs === 'live' ? 'LIVE \u2014 INN ' + (game.period||'') : game.time) : '';
  body.innerHTML    = '<div class="bs-loading">LOADING&hellip;</div>';
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  // Correct endpoint: site.web.api.espn.com (not site.api.espn.com) returns full boxscore
  var primaryUrl = 'https://site.web.api.espn.com/apis/site/v2/sports/baseball/college-baseball/summary?event=' + gameId;
  var proxyUrl   = 'https://corsproxy.io/?url=' + encodeURIComponent(primaryUrl);

  function tryFetch(url, fallbackUrl) {
    fetch(url)
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(data) {
        renderBoxScore(data, game, gameId, body, sub, title);
      })
      .catch(function(err) {
        console.warn('Box score fetch failed (' + url + '):', err);
        if (fallbackUrl) {
          tryFetch(fallbackUrl, null);
        } else {
          renderLocalSummary(game, gameId, body);
        }
      });
  }

  tryFetch(primaryUrl, proxyUrl);
}

// ── Render whatever ESPN actually returns ─────────────────────────────────────
function renderBoxScore(data, game, gameId, body, sub, title) {
  try {
    var html = '';

    // ── Pull teams from header ────────────────────────────────────────────────
    var hdr   = data.header || {};
    var comp  = (hdr.competitions || [])[0] || {};
    var tms   = comp.competitors || [];
    var away  = tms[0] || {}; var home = tms[1] || {};
    for (var ti = 0; ti < tms.length; ti++) {
      if (tms[ti].homeAway === 'away') away = tms[ti];
      if (tms[ti].homeAway === 'home') home = tms[ti];
    }
    var aTeam  = away.team  || {};
    var hTeam  = home.team  || {};
    var aName  = aTeam.shortDisplayName || aTeam.displayName || (game ? game.away.name : 'Away');
    var hName  = hTeam.shortDisplayName || hTeam.displayName || (game ? game.home.name : 'Home');
    var aAbbr  = aTeam.abbreviation || (game ? game.away.abbr : 'AWY');
    var hAbbr  = hTeam.abbreviation || (game ? game.home.abbr : 'HME');
    var aScore = parseInt(away.score) || (game ? game.away.score : 0);
    var hScore = parseInt(home.score) || (game ? game.home.score : 0);
    var aWin   = aScore > hScore; var hWin = hScore > aScore;
    var aRec   = ((away.records || [])[0] || {}).summary || (game ? game.away.rec : '');
    var hRec   = ((home.records || [])[0] || {}).summary || (game ? game.home.rec : '');
    var stDesc = ((comp.status || {}).type || {}).description || '';
    if (stDesc) sub.textContent = stDesc.toUpperCase();
    title.textContent = aName + ' @ ' + hName;

    // ── Score header ─────────────────────────────────────────────────────────
    html += '<div class="bs-score-row">' +
      '<div class="bs-team"><div class="bs-tname">' + aName + '</div>' +
        (aRec ? '<div class="bs-trec">' + aRec + '</div>' : '') + '</div>' +
      '<div class="bs-score ' + (aWin?'bs-win':'bs-lose') + '">' + aScore + '</div>' +
      '<div class="bs-vs">@</div>' +
      '<div class="bs-score ' + (hWin?'bs-win':'bs-lose') + '">' + hScore + '</div>' +
      '<div class="bs-team" style="text-align:right"><div class="bs-tname">' + hName + '</div>' +
        (hRec ? '<div class="bs-trec">' + hRec + '</div>' : '') + '</div>' +
    '</div>';

    // ── Linescore (from header competitors) ──────────────────────────────────
    var aLS = away.linescores || (game ? game.away.ls : []) || [];
    var hLS = home.linescores || (game ? game.home.ls : []) || [];
    if (aLS.length) {
      html += '<div class="bs-section"><div class="bs-section-title">LINESCORE</div>';
      html += '<div style="overflow-x:auto"><table class="bs-linescore"><thead><tr><th></th>';
      for (var li = 0; li < aLS.length; li++) html += '<th>' + (li + 1) + '</th>';
      html += '<th class="bs-tot">R</th></tr></thead><tbody>';
      html += '<tr><td class="bs-lbl">' + aAbbr + '</td>';
      for (var li2 = 0; li2 < aLS.length; li2++) {
        var av = aLS[li2].value !== undefined ? aLS[li2].value : (aLS[li2].a !== undefined ? aLS[li2].a : '-');
        html += '<td>' + (av === null ? '-' : av) + '</td>';
      }
      html += '<td class="bs-tot">' + aScore + '</td></tr>';
      html += '<tr><td class="bs-lbl">' + hAbbr + '</td>';
      for (var li3 = 0; li3 < aLS.length; li3++) {
        var hv = hLS[li3] ? (hLS[li3].value !== undefined ? hLS[li3].value : (hLS[li3].h !== undefined ? hLS[li3].h : '-')) : '-';
        html += '<td>' + (hv === null ? '-' : hv) + '</td>';
      }
      html += '<td class="bs-tot">' + hScore + '</td></tr>';
      html += '</tbody></table></div></div>';
    }

    // ── Player stats ─────────────────────────────────────────────────────────
    // ESPN college-baseball summary returns data.boxscore.players[] or .teams[]
    // Each entry: { team:{}, statistics:[{ name, labels:[], athletes:[{athlete,stats:[]}], totals:[] }] }
    var bx      = data.boxscore || {};
    // Try all known key names ESPN uses
    var entries = bx.players || bx.teams || [];
    var statHtml = '';

    // Helper: render one stat group table
    function renderStatGroup(ename, sTitle, labels, athletes, totals) {
      var out = '<div class="bs-section"><div class="bs-section-title">' +
        ename.toUpperCase() + ' \u2014 ' + sTitle + '</div>';
      out += '<div style="overflow-x:auto"><table class="bs-table"><thead><tr>' +
        '<th style="min-width:100px">PLAYER</th>';
      for (var l = 0; l < labels.length; l++) out += '<th class="r">' + labels[l] + '</th>';
      out += '</tr></thead><tbody>';

      for (var ai = 0; ai < athletes.length; ai++) {
        var ae  = athletes[ai];
        var ath = ae.athlete || {};
        var pn  = ath.shortName || ath.displayName || '\u2014';
        var pos = (ath.position || {}).abbreviation || '';
        var st  = ae.stats || [];
        var dnp = ae.didNotPlay || false;
        // Decision badge: ESPN may use ae.pitcher (string) or ae.reason
        var dec = (typeof ae.pitcher === 'string' ? ae.pitcher : '') || ae.decision || ae.reason || '';
        // Normalise "win"/"loss"/"save" words ESPN sometimes returns
        if (/^win/i.test(dec))  dec = 'W';
        if (/^loss/i.test(dec) || /^los/i.test(dec)) dec = 'L';
        if (/^save/i.test(dec) || /^sv/i.test(dec))  dec = 'SV';
        var decCls = dec === 'W' ? 'bs-pitrow-w' : dec === 'L' ? 'bs-pitrow-l' : (dec === 'S' || dec === 'SV') ? 'bs-pitrow-s' : '';

        out += '<tr><td class="bs-name"><span class="' + decCls + '">' + pn + '</span>';
        if (pos) out += '<span class="bs-pos">' + pos + '</span>';
        if (dec) out += '<span class="bs-pos ' + decCls + '"> ' + dec + '</span>';
        out += '</td>';

        if (dnp) {
          out += '<td colspan="' + labels.length + '" class="r" style="color:var(--muted)">DNP</td>';
        } else {
          for (var s = 0; s < labels.length; s++) {
            var v = st[s];
            out += '<td class="r">' + (v !== undefined && v !== null && v !== '' ? v : '\u2014') + '</td>';
          }
        }
        out += '</tr>';
      }

      if (totals && totals.length) {
        out += '<tr class="total-row"><td>TOTALS</td>';
        for (var t = 0; t < labels.length; t++) out += '<td class="r">' + (totals[t] !== undefined && totals[t] !== null ? totals[t] : '\u2014') + '</td>';
        out += '</tr>';
      }
      out += '</tbody></table></div></div>';
      return out;
    }

    for (var ei = 0; ei < entries.length; ei++) {
      var entry   = entries[ei];
      var eteam   = entry.team || {};
      var ename   = eteam.shortDisplayName || eteam.displayName || ('Team ' + (ei + 1));
      var statArr = entry.statistics || [];

      for (var si = 0; si < statArr.length; si++) {
        var sg       = statArr[si];
        var sgName   = (sg.name || sg.type || '').toLowerCase();
        var labels   = sg.labels || sg.keys || sg.columns || [];
        var athletes = sg.athletes || [];
        var totals   = sg.totals || [];
        if (!athletes.length) continue;

        // Determine batting vs pitching
        var isPitch = sgName.indexOf('pitch') >= 0 || sgName === 'pitching' ||
                      (labels.length > 0 && (labels[0] === 'IP' || labels[0] === 'H' && labels[1] === 'R'));
        var sTitle = isPitch ? 'PITCHING' : 'BATTING';
        statHtml += renderStatGroup(ename, sTitle, labels, athletes, totals);
      }
    }

    // ── W/L pitchers from leaders if no full player stats rendered ────────────
    if (!statHtml) {
      var wn = '', ln = '', sv = '';
      // Try data.leaders
      var ldrs = data.leaders || [];
      for (var ldi = 0; ldi < ldrs.length; ldi++) {
        var ldr  = ldrs[ldi];
        var ldrA = (ldr.leaders || [])[0] || {};
        var ldrN = (ldrA.athlete || {}).shortName || (ldrA.athlete || {}).displayName || '';
        var ldrAbb = (ldr.abbreviation || ldr.name || '').toUpperCase();
        if (ldrAbb === 'W')             wn = ldrN;
        if (ldrAbb === 'L')             ln = ldrN;
        if (ldrAbb === 'SV' || ldrAbb === 'S') sv = ldrN;
      }
      // Try local scoreboard data
      if (!wn && game && game.pitchers && game.pitchers.winner && game.pitchers.winner.athlete) wn = game.pitchers.winner.athlete.shortName || '';
      if (!ln && game && game.pitchers && game.pitchers.loser  && game.pitchers.loser.athlete)  ln = game.pitchers.loser.athlete.shortName  || '';

      if (wn || ln || sv) {
        statHtml += '<div class="bs-section"><div class="bs-section-title">PITCHING DECISION</div>';
        statHtml += '<div style="font-size:11px;line-height:2.4;padding:4px 0">';
        if (wn) statHtml += '<div><span class="bs-pitrow-w" style="font-weight:700;margin-right:8px">W</span>' + wn + '</div>';
        if (ln) statHtml += '<div><span class="bs-pitrow-l" style="font-weight:700;margin-right:8px">L</span>' + ln + '</div>';
        if (sv) statHtml += '<div><span class="bs-pitrow-s" style="font-weight:700;margin-right:8px">SV</span>' + sv + '</div>';
        statHtml += '</div></div>';
      } else {
        // No player data at all — tell the user gracefully
        statHtml += '<div class="bs-section" style="color:var(--muted);font-size:10px;letter-spacing:1px;text-align:center;padding:12px 0">' +
          'Individual stats not yet available for this game.</div>';
      }
    }

    html += statHtml;

    // ── ESPN links ─────────────────────────────────────────────────────────────
    var espnBase = 'https://www.espn.com/college-baseball/';
    var isFin  = game && game.gs === 'final';
    var isLive = game && game.gs === 'live';
    var isSched= game && game.gs === 'scheduled';
    html += '<div style="display:flex;gap:12px;justify-content:center;padding:16px 0 4px;flex-wrap:wrap">';
    if (isLive) html += '<a href="' + espnBase + 'game/_/gameId/' + gameId + '" target="_blank" rel="noopener" style="color:var(--live);font-size:10px;letter-spacing:2px;border:1px solid var(--live);padding:5px 12px;border-radius:2px">&#9654; GAMECAST</a>';
    if (!isSched) html += '<a href="' + espnBase + 'boxscore/_/gameId/' + gameId + '" target="_blank" rel="noopener" style="color:var(--accent);font-size:10px;letter-spacing:2px;border:1px solid var(--accent);padding:5px 12px;border-radius:2px">&#9776; ESPN BOX SCORE</a>';
    html += '</div>';

    body.innerHTML = html;

  } catch(e) {
    console.error('renderBoxScore:', e);
    renderLocalSummary(game, gameId, body);
  }
}

// ── Fallback: render linescore + W/L from local scoreboard data ───────────────
function renderLocalSummary(game, gameId, body) {
  if (!game) { body.innerHTML = '<div class="bs-error">&#9918; NO DATA AVAILABLE</div>'; return; }
  var aWin = game.away.score > game.home.score;
  var hWin = game.home.score > game.away.score;
  var html = '<div class="bs-score-row">' +
    '<div class="bs-team"><div class="bs-tname">' + game.away.name + '</div>' +
      (game.away.rec ? '<div class="bs-trec">' + game.away.rec + '</div>' : '') + '</div>' +
    '<div class="bs-score ' + (aWin?'bs-win':'bs-lose') + '">' + game.away.score + '</div>' +
    '<div class="bs-vs">@</div>' +
    '<div class="bs-score ' + (hWin?'bs-win':'bs-lose') + '">' + game.home.score + '</div>' +
    '<div class="bs-team" style="text-align:right"><div class="bs-tname">' + game.home.name + '</div>' +
      (game.home.rec ? '<div class="bs-trec">' + game.home.rec + '</div>' : '') + '</div>' +
  '</div>';
  if (game.ls && game.ls.length) {
    html += '<div class="bs-section"><div class="bs-section-title">LINESCORE</div>';
    html += '<div style="overflow-x:auto"><table class="bs-linescore"><thead><tr><th></th>';
    for (var i = 0; i < game.ls.length; i++) html += '<th>' + game.ls[i].inn + '</th>';
    html += '<th class="bs-tot">R</th></tr></thead><tbody>';
    html += '<tr><td class="bs-lbl">' + game.away.abbr + '</td>';
    for (var i2 = 0; i2 < game.ls.length; i2++) { var av = game.ls[i2].a; html += '<td>' + (av !== null && av !== undefined ? av : '-') + '</td>'; }
    html += '<td class="bs-tot">' + game.away.score + '</td></tr>';
    html += '<tr><td class="bs-lbl">' + game.home.abbr + '</td>';
    for (var i3 = 0; i3 < game.ls.length; i3++) { var hv = game.ls[i3].h; html += '<td>' + (hv !== null && hv !== undefined ? hv : '-') + '</td>'; }
    html += '<td class="bs-tot">' + game.home.score + '</td></tr>';
    html += '</tbody></table></div></div>';
  }
  var wp = game.pitchers.winner; var lp = game.pitchers.loser;
  if (wp || lp) {
    html += '<div class="bs-section"><div class="bs-section-title">PITCHING DECISION</div><div style="font-size:11px;line-height:2.4;padding:4px 0">';
    if (wp && wp.athlete) html += '<div><span class="bs-pitrow-w" style="font-weight:700;margin-right:8px">W</span>' + (wp.athlete.shortName||'') + '</div>';
    if (lp && lp.athlete) html += '<div><span class="bs-pitrow-l" style="font-weight:700;margin-right:8px">L</span>' + (lp.athlete.shortName||'') + '</div>';
    html += '</div></div>';
  }
  html += '<div style="text-align:center;padding:12px 0 4px"><a href="https://www.espn.com/college-baseball/boxscore/_/gameId/' + gameId + '" target="_blank" style="color:var(--accent);font-size:10px;letter-spacing:2px">FULL BOX SCORE ON ESPN &#8599;</a></div>';
  body.innerHTML = html;
}

// Modal close handlers
document.getElementById('bsClose').addEventListener('click', function() {
  document.getElementById('bsOverlay').classList.remove('open');
  document.body.style.overflow = '';
});
document.getElementById('bsOverlay').addEventListener('click', function(e) {
  if (e.target === this) {
    this.classList.remove('open');
    document.body.style.overflow = '';
  }
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    document.getElementById('bsOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }
});

// ── Boot ──────────────────────────────────────────────────────────────────────
selDate = fmtDate(new Date());
buildDateStrip();
fetchScores();
fetchAllStats();
setInterval(fetchScores, 15000);       // full scoreboard refresh every 15s
setInterval(fetchAllStats, 300000);    // stats ticker every 5 min

</script>
